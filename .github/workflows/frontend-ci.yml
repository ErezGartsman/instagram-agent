name: Frontend CI

# NO path filter — deliberate. "Vite build check" is a REQUIRED status check on
# main's branch-protection rule. A path-filtered workflow is *skipped* (not run)
# on backend-only PRs, and GitHub reports a skipped-but-required check as
# permanently "expected"/pending — which silently blocks those PRs from merging
# (the mirror image of the backend-ci trap). Running the build on every PR keeps
# the required check always resolving.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "Vite build check"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fronted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fronted/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: fronted/dist/
          retention-days: 3
