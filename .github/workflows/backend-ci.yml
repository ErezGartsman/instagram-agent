name: Backend CI

# Triggers: every push to main/develop and every PR targeting main.
#
# NO path filter — this is deliberate. "pytest — backend unit tests" is a
# REQUIRED status check in main's branch-protection rule. A path-filtered
# workflow is *skipped* (not run) on PRs that don't touch beckend/**, and
# GitHub reports a skipped-but-required check as permanently "expected"/pending
# — which silently blocks every frontend-only PR from merging. Running the
# (fast, fully-mocked) backend suite on all PRs guarantees the required check
# always reports a real pass/fail, so frontend-only changes are never deadlocked.
# Vercel picks up the deployment automatically once this workflow goes green.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "pytest — backend unit tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: beckend

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup with pip cache ───────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: beckend/requirements.txt

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run test suite ─────────────────────────────────────────────────────
      # Real DB and Gemini calls are mocked — no secrets needed for tests.
      # GEMINI_API_KEY and SUPABASE_DB_URL are fake values that satisfy
      # pydantic-settings validation without touching real services.
      - name: Run pytest
        env:
          GEMINI_API_KEY: "ci-fake-key-not-real"
          SUPABASE_DB_URL: "postgresql://fake:fake@localhost:5432/fake"
        run: |
          pytest tests/ -v --tb=short --no-header \
            --junit-xml=test-results.xml

      # ── 5. Upload test results (visible in GitHub PR UI) ─────────────────────
      - name: Upload test results
        if: always()   # upload even when tests fail so we can see what broke
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: beckend/test-results.xml
          retention-days: 7
